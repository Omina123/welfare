{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== SEO META TAGS ===== -->
    <title>Update Successful – ELDOPOLY WELFARE</title>
    <meta name="description" content="Your ELDOPOLY WELFARE profile has been successfully updated. You can now access your member dashboard and welfare benefits.">
    <meta name="keywords" content="ELDOPOLY WELFARE, profile update success, member dashboard, welfare benefits, Eldoret">
    <meta name="robots" content="index, follow">
    <meta name="author" content="ELDOPOLY WELFARE">
    <link rel="canonical" href="https://www.eldopolywelfare.co.ke/update-success/">

    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --welfare-dark-green: #004d26;
            --welfare-maroon: #800000;
            --welfare-gold: #ffcc00;
            --welfare-light-bg: #f5f0eb;
            --welfare-white: #FFFFFF;
            --welfare-shadow: 0 25px 50px -12px rgba(0, 77, 38, 0.3);
            --welfare-radius: 24px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(145deg, var(--welfare-dark-green) 0%, #1a3a2a 40%, var(--welfare-maroon) 100%);
            background-attachment: fixed;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            position: relative;
            padding: 20px;
        }

        /* ===== ANIMATED BACKGROUND SHAPES ===== */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.06);
            animation: floatShape 20s infinite alternate ease-in-out;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; top: -5%; left: -5%; }
        .shape:nth-child(2) { width: 450px; height: 450px; bottom: -10%; right: -10%; animation-duration: 25s; background: rgba(128, 0, 0, 0.08); }
        .shape:nth-child(3) { width: 200px; height: 200px; top: 40%; right: 5%; animation-duration: 18s; background: rgba(255, 204, 0, 0.04); }
        .shape:nth-child(4) { width: 350px; height: 350px; bottom: 20%; left: -8%; animation-duration: 22s; background: rgba(0, 77, 38, 0.08); }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -60px) scale(1.05) rotate(5deg); }
            66% { transform: translate(-30px, 40px) scale(0.95) rotate(-5deg); }
            100% { transform: translate(20px, -20px) scale(1.02) rotate(3deg); }
        }

        /* ===== SUCCESS CARD ===== */
        .success-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: auto;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--welfare-radius);
            box-shadow: var(--welfare-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 204, 0, 0.2);
            transition: transform var(--transition), box-shadow var(--transition);
            overflow: hidden;
            text-align: center;
        }

        .success-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
        }

        /* ===== HEADER ===== */
        .success-header {
            background: linear-gradient(135deg, var(--welfare-dark-green) 0%, #1a4a2a 50%, var(--welfare-maroon) 100%);
            padding: 45px 20px 50px;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .logo-circle {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, var(--welfare-gold), #f5d742);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--welfare-dark-green);
            font-weight: 800;
            font-size: 1.8rem;
            margin: -80px auto 0;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 24px -8px rgba(255, 204, 0, 0.4);
            position: relative;
            z-index: 2;
        }

        .success-header h3 {
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.4rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin-top: 0.75rem;
            margin-bottom: 0;
        }

        .success-header .subtitle {
            color: rgba(255, 204, 0, 0.9);
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        /* ===== BODY ===== */
        .card-body {
            padding: 2rem 2rem 1.5rem;
        }

        .success-icon-main {
            font-size: 4.5rem;
            color: var(--welfare-dark-green);
            margin-bottom: 20px;
            display: inline-block;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 77, 38, 0.06);
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            text-align: center;
        }

        .success-icon-main i {
            line-height: 100px;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .card-body h3 {
            color: var(--welfare-dark-green);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .card-body p {
            color: #5a6471;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* ===== BUTTON ===== */
        .btn-eldo {
            background: linear-gradient(135deg, var(--welfare-dark-green), #1a5a3a);
            color: var(--welfare-white);
            font-weight: 700;
            padding: 14px 20px;
            transition: all var(--transition);
            border-radius: 12px;
            border: none;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-transform: uppercase;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px -8px rgba(0, 77, 38, 0.4);
        }

        .btn-eldo:hover {
            color: var(--welfare-gold);
            box-shadow: 0 14px 28px -10px rgba(0, 77, 38, 0.5);
            transform: translateY(-3px);
            background: linear-gradient(135deg, #1a4a2a, var(--welfare-maroon));
        }

        .btn-eldo:active {
            transform: scale(0.97);
        }

        /* ===== FOOTER DECOR ===== */
        .footer-decor {
            height: 6px;
            background: linear-gradient(to right, var(--welfare-gold), var(--welfare-dark-green), var(--welfare-maroon));
            opacity: 0.8;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card-body { padding: 1.5rem; }
            .success-icon-main { width: 80px; height: 80px; font-size: 3.5rem; line-height: 80px; }
            .success-icon-main i { line-height: 80px; }
            .success-header h3 { font-size: 1.1rem; }
            .logo-circle { width: 65px; height: 65px; font-size: 1.5rem; margin-top: -70px; }
            .btn-eldo { font-size: 0.85rem; padding: 12px; }
        }
    </style>
</head>

<body>

    <!-- ===== BACKGROUND SHAPES ===== -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- ===== SUCCESS WRAPPER ===== -->
    <div class="success-wrapper">
        <div class="card success-card">

            <!-- HEADER -->
            <div class="success-header">
                <div class="logo-circle">🤝</div>
                <h3>ELDOPOLY WELFARE</h3>
                <p class="subtitle">Security Verified</p>
            </div>

            <!-- BODY -->
            <div class="card-body">
                <div class="success-icon-main">
                    <i class="bi bi-shield-check"></i>
                </div>

                <h3>Update Successful</h3>
                <p class="mb-4">Your profile has been successfully updated. You can now access your member dashboard and welfare benefits.</p>

                <a href="{% url 'login' %}" class="btn-eldo shadow-sm">
                    Proceed to Login <i class="bi bi-arrow-right-circle ms-2"></i>
                </a>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">
                        <i class="bi bi-lock me-1"></i> ELDOPOLY WELFARE Management System
                    </p>
                </div>
            </div>

            <!-- FOOTER DECOR -->
            <div class="footer-decor"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
