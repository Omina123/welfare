<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Contract | Eldopoly SACCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --eldo-blue: #000428;
            --eldo-gold: #fdbb2d;
            --eldo-light: #f8f9fa;
        }

        body {
            background-color: var(--eldo-light);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .navbar-eldo {
            background-color: var(--eldo-blue);
            border-bottom: 3px solid var(--eldo-gold);
        }

        .card-eldo {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .card-header-eldo {
            background-color: var(--eldo-blue);
            color: white;
            border-radius: 12px 12px 0 0 !important;
            border-bottom: 2px solid var(--eldo-gold);
        }

        .btn-eldo {
            background-color: var(--eldo-blue);
            color: white;
            border: 1px solid var(--eldo-blue);
            transition: 0.3s;
        }

        .btn-eldo:hover {
            background-color: #002a50;
            color: var(--eldo-gold);
        }

        .form-label {
            font-weight: 600;
            color: var(--eldo-blue);
        }

        .member-badge {
            background-color: var(--eldo-gold);
            color: var(--eldo-blue);
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-eldo mb-5">
    <div class="container">
        <span class="navbar-brand text-white fw-bold">
            <i class="bi bi-person-badge-fill me-2"></i> HR Management Portal
        </span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card card-eldo">
                <div class="card-header card-header-eldo p-4">
                    <h4 class="mb-0">Update Employment Terms</h4>
                </div>
                <div class="card-body p-4">
                    
                    <div class="d-flex align-items-center mb-4">
                        <div class="me-3">
                            <i class="bi bi-person-circle text-muted" style="font-size: 3rem;"></i>
                        </div>
                        <div>
                            <h5 class="mb-0">{{ profile.user.get_full_name }}</h5>
                            <span class="member-badge">PF NO: {{ profile.pf_number }}</span>
                        </div>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label for="employment_status" class="form-label">Employment Status</label>
                            <select name="employment_status" id="employment_status" class="form-select form-select-lg">
                                <option value="PERMANENT" {% if profile.employment_status == 'PERMANENT' %}selected{% endif %}>
                                    Permanent & Pensionable
                                </option>
                                <option value="CONTRACT" {% if profile.employment_status == 'CONTRACT' %}selected{% endif %}>
                                    Contractual Terms
                                </option>
                            </select>
                        </div>

                        <div class="mb-4" id="expiry-section" style="display: {% if profile.employment_status == 'CONTRACT' %}block{% else %}none{% endif %};">
                            <label for="contract_expiry" class="form-label text-danger">
                                <i class="bi bi-calendar-event me-1"></i> Contract Expiry Date
                            </label>
                            <input type="date" name="contract_expiry" id="contract_expiry" class="form-control form-control-lg" 
                                   value="{{ profile.contract_expiry|date:'Y-m-d' }}">
                            <div class="form-text mt-2 text-muted">
                                Please specify when the current contract ends for loan limit calculations.
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-eldo btn-lg">
                                <i class="bi bi-save2 me-2"></i> Update Records
                            </button>
                            <a href="{% url 'Human_Resource' %}" class="btn btn-light border">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center mt-4 text-muted small">
                Authorized Personnel Access Only &bull; Eldopoly SACCO System 2026
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById('employment_status').addEventListener('change', function() {
        const expirySection = document.getElementById('expiry-section');
        if (this.value === 'CONTRACT') {
            expirySection.style.display = 'block';
            document.getElementById('contract_expiry').setAttribute('required', 'required');
        } else {
            expirySection.style.display = 'none';
            document.getElementById('contract_expiry').removeAttribute('required');
        }
    });
</script>

</body>
</html>
