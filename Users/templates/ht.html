<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Registration Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-green: #28a745;
            --eldo-light-green: #e9f7ef;
            --eldo-white: #FFFFFF;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--eldo-light-green);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-card {
            max-width: 480px;
            margin: auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            background-color: var(--eldo-white);
            overflow: hidden;
        }

        .success-header {
            background: linear-gradient(135deg, var(--eldo-navy) 0%, var(--eldo-green) 100%);
            padding: 50px 20px;
            text-align: center;
            position: relative;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--eldo-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--eldo-green);
            font-size: 2.5rem;
            margin: 0 auto -90px; 
            border: 4px solid var(--eldo-light-green);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .btn-eldo {
            background-color: var(--eldo-green);
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            border: none;
        }

        .btn-eldo:hover {
            background-color: #218838;
            color: white;
            transform: translateY(-2px);
        }

        .success-icon {
            font-size: 4rem;
            color: var(--eldo-green);
            margin-bottom: 10px;
        }

        .welcome-box {
            background-color: var(--eldo-light-green);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
    </style>
</head>

<body>

<div class="container text-center">
    <div class="logo-circle">
        <i class="bi bi-check-all"></i>
    </div>
    
    <div class="card success-card">
        <div class="success-header">
            <h3 class="fw-bold mb-0" style="color:white; letter-spacing: 2px;">ELDOPOLY</h3>
            <p class="small mb-0 text-white opacity-75 fw-bold">WELCOME TO THE SACCO</p>
        </div>

        <div class="card-body p-4 pt-5 mt-4">
            <div class="content">
                <i class="bi bi-person-check success-icon"></i>
                <h3 class="fw-bold text-dark">Success!</h3>
                
                <div class="welcome-box">
                    <p class="mb-0 fw-bold text-success">
                        Account created successfully.
                    </p>
                    <p class="small text-muted mb-0">
                        You are now a registered member of Eldopoly SACCO.
                    </p>
                </div>

                <p class="text-muted small px-3">
                    Please log in to your account to complete your profile and start managing your savings and loans.
                </p>

                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn-eldo mb-3 shadow-sm">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Click Here to Login
                    </a>
                    
                    <div class="d-flex justify-content-between px-2">
                        <a href="{% url 'home' %}" class="small text-muted text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Homepage
                        </a>
                        <span class="small text-muted">Need help? Contact Support</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="height: 8px; background: linear-gradient(to right, var(--eldo-gold) 0%, var(--eldo-green) 100%);"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
