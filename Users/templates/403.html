<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldopoly SACCO | Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --eldo-navy: #0B1F3A;
            --eldo-gold: #D4AF37;
            --eldo-green: #28a745;
            --eldo-light-green: #e9f7ef;
            --eldo-white: #FFFFFF;
            --eldo-red: #dc3545;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: var(--eldo-light-green);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .error-card {
            max-width: 450px;
            margin: auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            background-color: var(--eldo-white);
            overflow: hidden;
            transition: 0.3s ease-in-out;
        }

        .error-header {
            /* Changed gradient to include a subtle red hint for error context */
            background: linear-gradient(135deg, var(--eldo-gold) 0%, var(--eldo-green) 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--eldo-navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            margin: 0 auto -85px; 
            border: 4px solid var(--eldo-white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .btn-eldo-outline {
            border: 2px solid var(--eldo-green);
            color: var(--eldo-green);
            font-weight: 700;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        .btn-eldo-outline:hover {
            background-color: var(--eldo-green);
            color: white;
        }

        .error-icon {
            font-size: 3rem;
            color: var(--eldo-red);
            margin-bottom: 15px;
        }

        .restriction-notice {
            background-color: #fff5f5;
            border-left: 4px solid var(--eldo-red);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>

<body>

<div class="container text-center">
    <div class="logo-circle">
        <i class="bi bi-shield-lock-fill"></i>
    </div>
    
    <div class="card error-card">
        <div class="error-header">
            <h3 class="fw-bold mb-0" style="color:var(--eldo-navy); letter-spacing: 2px;">ELDOPOLY</h3>
            <p class="small mb-0 text-dark opacity-75 fw-bold">SECURITY SYSTEM</p>
        </div>

        <div class="card-body p-4 pt-5 mt-3">
            <div class="error-content">
                <i class="bi bi-exclamation-octagon error-icon"></i>
                <h4 class="fw-bold text-dark">403 - Access Denied</h4>
                
                <div class="restriction-notice">
                    <p class="small text-danger mb-0 fw-bold">
                        Unauthorized Access Attempt Detected.
                    </p>
                </div>

                <p class="text-muted small px-3">
                    Sorry, your account does not have the necessary permissions to view the <strong>Management Dashboard</strong>. Please contact the administrator if you believe this is a mistake.
                </p>

                <div class="mt-4">
                    <a href="{% url 'member_dashboard' %}" class="btn-eldo-outline mb-3">
                        <i class="bi bi-house-door me-2"></i> Return to My Dashboard
                    </a>
                    
                    <a href="{% url 'home' %}" class="small text-muted text-decoration-none">
                        Go to Homepage
                    </a>
                </div>
            </div>
        </div>
        
        <div style="height: 8px; background: linear-gradient(to right, var(--eldo-gold) 0%, var(--eldo-green) 100%);"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
