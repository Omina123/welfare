<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== SEO META TAGS ===== -->
    <title>ELDOPOLY WELFARE – Member Login Portal</title>
    <meta name="description" content="Login to your ELDOPOLY WELFARE member portal to access welfare benefits, savings, and community support services in Eldoret, Kenya.">
    <meta name="keywords" content="ELDOPOLY WELFARE login, member portal, welfare benefits, savings, community support, Eldoret">
    <meta name="robots" content="index, follow">
    <meta name="author" content="ELDOPOLY WELFARE">
    <link rel="canonical" href="https://www.eldopolywelfare.co.ke/login/">

    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --welfare-dark-green: #004d26;
            --welfare-maroon: #800000;
            --welfare-gold: #ffcc00;
            --welfare-light-bg: #f5f0eb;
            --welfare-white: #FFFFFF;
            --welfare-shadow: 0 25px 50px -12px rgba(0, 77, 38, 0.3);
            --welfare-radius: 28px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--welfare-dark-green) 0%, #1a3a2a 40%, var(--welfare-maroon) 100%);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
            padding: 1.5rem;
        }

        /* ===== ANIMATED BACKGROUND SHAPES ===== */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.06);
            animation: floatShape 20s infinite alternate ease-in-out;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; top: -5%; left: -5%; }
        .shape:nth-child(2) { width: 450px; height: 450px; bottom: -10%; right: -10%; animation-duration: 25s; background: rgba(128, 0, 0, 0.08); }
        .shape:nth-child(3) { width: 200px; height: 200px; top: 40%; right: 5%; animation-duration: 18s; background: rgba(255, 204, 0, 0.04); }
        .shape:nth-child(4) { width: 350px; height: 350px; bottom: 20%; left: -8%; animation-duration: 22s; background: rgba(0, 77, 38, 0.08); }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -60px) scale(1.05) rotate(5deg); }
            66% { transform: translate(-30px, 40px) scale(0.95) rotate(-5deg); }
            100% { transform: translate(20px, -20px) scale(1.02) rotate(3deg); }
        }

        /* ===== GLASS CARD ===== */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            margin: auto;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--welfare-radius);
            box-shadow: var(--welfare-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 204, 0, 0.2);
            transition: transform var(--transition), box-shadow var(--transition);
            overflow: hidden;
        }

        .login-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
        }

        /* ===== HEADER WITH GRADIENT ===== */
        .login-header {
            background: linear-gradient(135deg, var(--welfare-dark-green) 0%, #1a4a2a 50%, var(--welfare-maroon) 100%);
            padding: 2rem 2rem 3rem;
            text-align: center;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .login-header .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--welfare-gold), #f5d742);
            border-radius: 50%;
            margin-bottom: 1rem;
            box-shadow: 0 12px 24px -8px rgba(255, 204, 0, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.25);
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--welfare-dark-green);
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        .login-header .subtitle {
            color: rgba(255, 204, 0, 0.9);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        /* ===== BODY ===== */
        .login-body {
            padding: 2.5rem 2rem 2rem;
        }

        .form-floating {
            margin-bottom: 1.5rem;
        }

        .form-floating .form-control {
            border-radius: 14px;
            border: 2px solid #e9edf4;
            padding: 1rem 1.2rem;
            height: 60px;
            background: rgba(255, 255, 255, 0.8);
            transition: border var(--transition), box-shadow var(--transition), background var(--transition);
            font-size: 0.95rem;
        }

        .form-floating .form-control:focus {
            border-color: var(--welfare-gold);
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.2);
            background: #fff;
        }

        .form-floating label {
            padding: 0 0.8rem;
            font-weight: 500;
            color: #6b7a8f;
            letter-spacing: 0.3px;
        }

        .form-floating .form-control:focus ~ label,
        .form-floating .form-control:not(:placeholder-shown) ~ label {
            color: var(--welfare-dark-green);
            font-weight: 600;
        }

        /* Password toggle */
        .pass-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9aa5b9;
            font-size: 1.2rem;
            transition: color var(--transition);
            z-index: 5;
        }
        .toggle-password:hover {
            color: var(--welfare-maroon);
        }

        .forgot-link {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--welfare-dark-green);
            text-decoration: none;
            transition: color var(--transition);
            border-bottom: 2px solid transparent;
            margin-top: 0.2rem;
        }
        .forgot-link:hover {
            color: var(--welfare-maroon);
            border-bottom-color: var(--welfare-gold);
        }

        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--welfare-dark-green), #1a5a3a);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            transition: all var(--transition);
            box-shadow: 0 8px 20px -8px rgba(0, 77, 38, 0.4);
            margin-top: 1.5rem;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px -10px rgba(0, 77, 38, 0.5);
            background: linear-gradient(135deg, #1a4a2a, var(--welfare-maroon));
        }
        .btn-login:active {
            transform: scale(0.97);
        }

        .register-link {
            color: var(--welfare-dark-green);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid var(--welfare-gold);
            transition: color var(--transition), border-color var(--transition);
        }
        .register-link:hover {
            color: var(--welfare-maroon);
            border-color: var(--welfare-maroon);
        }

        /* ===== FOOTER DECOR ===== */
        .login-footer {
            height: 6px;
            background: linear-gradient(to right, var(--welfare-gold), var(--welfare-dark-green), var(--welfare-maroon));
            opacity: 0.8;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-body { padding: 2rem 1.5rem; }
            .login-header h1 { font-size: 1.4rem; }
            .login-header .logo-icon { width: 70px; height: 70px; font-size: 1.8rem; }
        }
    </style>
</head>

<body>
    <!-- ===== BACKGROUND SHAPES ===== -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- ===== LOGIN WRAPPER ===== -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- HEADER -->
            <div class="login-header">
                <div class="logo-icon">🤝</div>
                <h1>ELDOPOLY WELFARE</h1>
                <p class="subtitle">Member Support Portal</p>
            </div>

            <!-- BODY -->
            <div class="login-body">
                <form method="POST" id="loginForm">
                    {% csrf_token %}

                    <!-- Non-field errors -->
                    {% if form.non_field_errors %}
                    <div class="alert alert-danger py-2 small border-0 mb-4 rounded-pill shadow-sm">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ form.non_field_errors }}
                    </div>
                    {% endif %}

                    <!-- Username / Email -->
                    <div class="form-floating">
                        <input type="text" name="Email" class="form-control" id="loginEmail" placeholder=" " required>
                        <label for="loginEmail"><i class="bi bi-person-fill me-2"></i>Email or PF Number</label>
                    </div>

                    <!-- Password -->
                    <div class="form-floating pass-wrapper">
                        <input type="password" name="password" class="form-control" id="loginPassword" placeholder=" " required>
                        <label for="loginPassword"><i class="bi bi-lock-fill me-2"></i>Password</label>
                        <i class="bi bi-eye toggle-password" id="eye" role="button" aria-label="Toggle password visibility"></i>
                    </div>

                    <!-- Forgot & Register -->
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <a href="{% url 'password_reset' %}" class="forgot-link">Forgot Password?</a>
                        <span class="small">New? <a href="{% url 'register' %}" class="register-link">Register</a></span>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-login" id="submitBtn">
                        <span id="btnText">SIGN IN</span>
                        <i class="bi bi-box-arrow-in-right"></i>
                    </button>
                </form>

                <!-- ===== WELFARE MESSAGE ===== -->
                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">
                        <i class="bi bi-heart-fill" style="color: var(--welfare-maroon);"></i>
                        Empowering Members, Building Communities
                    </p>
                </div>
            </div>

            <!-- Decorative footer -->
            <div class="login-footer"></div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
        // Toggle password visibility
        const eye = document.getElementById('eye');
        const passInput = document.getElementById('loginPassword');

        eye.addEventListener('click', function() {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Button loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('btnText');
            btn.disabled = true;
            text.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Authenticating...';
        });
    </script>
</body>
</html>
