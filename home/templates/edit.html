<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Role | Eldopoly SACCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f4f6; }
        .card { border-radius: 15px; border: none; }
        .bg-eldo-navy { background-color: #0B1F3A; color: white; }
        .btn-gold { background: #D4AF37; color: #0B1F3A; font-weight: bold; border: none; }
    </style>
</head>
 {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-1 px-3 mb-0 me-3 small shadow-sm">{{ message }}</div>
            {% endfor %}
        {% endif %}
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-eldo-navy text-center py-3">
                    <h4 class="mb-0">Change User Role</h4>
                </div>
                <div class="card-body p-4">
                    <p><strong>Member Name:</strong> {{ target_user.get_full_name }}</p>
                    <p><strong>Current Role:</strong> {{ target_user.get_user_type_display }}</p>
                    <hr>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Select New Designation</label>
                            {{ form.user_type }}
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-gold">Update Permissions</button>
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
