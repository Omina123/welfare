<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== SEO META TAGS ===== -->
    <title>Request Share Refund – ELDOPOLY WELFARE</title>
    <meta name="description" content="Request a share refund from ELDOPOLY WELFARE. Submit your refund application and reasons for share withdrawal.">
    <meta name="keywords" content="ELDOPOLY WELFARE share refund, refund request, share withdrawal, member refund, Eldoret">
    <meta name="robots" content="index, follow">
    <meta name="author" content="ELDOPOLY WELFARE">
    <link rel="canonical" href="https://www.eldopolywelfare.co.ke/share-refund/">

    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --welfare-dark-green: #004d26;
            --welfare-maroon: #800000;
            --welfare-gold: #ffcc00;
            --welfare-light-bg: #f5f0eb;
            --welfare-white: #ffffff;
            --welfare-shadow: 0 15px 35px rgba(0, 77, 38, 0.08);
            --welfare-radius: 24px;
            --transition: 0.3s ease;
        }

        body { 
            background: linear-gradient(145deg, var(--welfare-dark-green) 0%, #1a3a2a 40%, var(--welfare-maroon) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        /* ===== ANIMATED BACKGROUND SHAPES ===== */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.06);
            animation: floatShape 20s infinite alternate ease-in-out;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; top: -5%; left: -5%; }
        .shape:nth-child(2) { width: 450px; height: 450px; bottom: -10%; right: -10%; animation-duration: 25s; background: rgba(128, 0, 0, 0.08); }
        .shape:nth-child(3) { width: 200px; height: 200px; top: 40%; right: 5%; animation-duration: 18s; background: rgba(255, 204, 0, 0.04); }
        .shape:nth-child(4) { width: 350px; height: 350px; bottom: 20%; left: -8%; animation-duration: 22s; background: rgba(0, 77, 38, 0.08); }

        @keyframes floatShape {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -60px) scale(1.05) rotate(5deg); }
            66% { transform: translate(-30px, 40px) scale(0.95) rotate(-5deg); }
            100% { transform: translate(20px, -20px) scale(1.02) rotate(3deg); }
        }

        /* ===== WRAPPER ===== */
        .refund-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
            margin: 0 auto;
        }

        /* ===== BACK LINK ===== */
        .back-link {
            display: inline-flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .back-link:hover {
            color: var(--welfare-gold);
            background: rgba(255, 204, 0, 0.1);
            transform: translateX(-4px);
        }

        .back-link i {
            margin-right: 10px;
            font-size: 1.1rem;
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 204, 0, 0.12);
            border-radius: var(--welfare-radius);
            padding: 2.5rem;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.4);
            transition: all var(--transition);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 35px 70px -20px rgba(0, 0, 0, 0.5);
        }

        /* ===== HEADER ===== */
        .icon-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: rgba(255, 204, 0, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 204, 0, 0.15);
        }

        .icon-circle i {
            color: var(--welfare-dark-green);
            font-size: 2rem;
        }

        .glass-card h3 {
            color: var(--welfare-dark-green);
            font-weight: 800;
        }

        .glass-card .text-muted {
            color: #64748b !important;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-label { 
            font-weight: 700; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: var(--welfare-dark-green); 
            letter-spacing: 0.05em; 
        }

        .form-label i {
            color: var(--welfare-gold);
            margin-right: 4px;
        }

        .form-control {
            border: 2px solid #e9edf2;
            border-radius: 12px;
            padding: 12px 16px;
            background: #fafcff;
            font-weight: 500;
            color: #1e293b;
            transition: all var(--transition);
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--welfare-gold);
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.12);
            background: #fff;
        }

        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .input-group-text {
            background: #f1f4f9;
            border: 2px solid #e9edf2;
            border-right: none;
            border-radius: 12px 0 0 12px;
            font-weight: 700;
            color: var(--welfare-dark-green);
            font-size: 0.9rem;
            padding: 0 16px;
        }

        .input-group .form-control {
            border-radius: 0 12px 12px 0;
        }

        /* ===== REASON CHECKLIST ===== */
        .reason-checklist {
            background: #fafcff;
            border: 2px solid #e9edf2;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            transition: all var(--transition);
        }

        .reason-checklist:hover {
            border-color: var(--welfare-gold);
        }

        .custom-check {
            padding: 10px 14px;
            border-radius: 10px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .custom-check:hover { 
            background: rgba(255, 204, 0, 0.04); 
            border-color: rgba(255, 204, 0, 0.1); 
        }

        .form-check-input {
            width: 1.2em; 
            height: 1.2em;
            border: 2px solid var(--welfare-dark-green);
            cursor: pointer;
            border-radius: 4px;
            transition: all var(--transition);
        }

        .form-check-input:checked { 
            background-color: var(--welfare-dark-green); 
            border-color: var(--welfare-dark-green); 
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.15);
            border-color: var(--welfare-gold);
        }

        .form-check-label {
            font-weight: 500;
            color: #1e293b;
        }

        .form-check-label .text-primary {
            color: var(--welfare-dark-green) !important;
        }

        /* ===== BUTTON ===== */
        .btn-eldo {
            background: linear-gradient(135deg, var(--welfare-dark-green), #1a5a3a);
            color: white;
            font-weight: 700;
            border-radius: 14px;
            padding: 16px 24px;
            border: none;
            transition: all var(--transition);
            font-size: 1rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-eldo:hover {
            background: linear-gradient(135deg, #1a4a2a, var(--welfare-maroon));
            color: var(--welfare-gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 77, 38, 0.2);
        }

        .btn-eldo:active {
            transform: scale(0.97);
        }

        .btn-eldo i {
            font-size: 1.1rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 576px) {
            body { padding: 20px 15px; }
            .glass-card { padding: 1.5rem; }
            .glass-card h3 { font-size: 1.2rem; }
            .icon-circle { width: 60px; height: 60px; }
            .icon-circle i { font-size: 1.5rem; }
            .reason-checklist { padding: 1rem; }
            .btn-eldo { font-size: 0.9rem; padding: 14px 20px; }
            .back-link { font-size: 0.8rem; padding: 8px 16px; }
        }
    </style>
</head>

<body>

    <!-- ===== BACKGROUND SHAPES ===== -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- ===== REFUND WRAPPER ===== -->
    <div class="refund-wrapper">

        <!-- ===== BACK LINK ===== -->
        <a href="{% url 'member_dashboard' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <!-- ===== GLASS CARD ===== -->
        <div class="glass-card">
            <div class="text-center mb-4">
                <div class="icon-circle mb-3">
                    <i class="fas fa-hand-holding-dollar"></i>
                </div>
                <h3 class="fw-bold">Share Refund Request</h3>
                <p class="text-muted">Fill out the details below to process your share withdrawal</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <!-- ===== AMOUNT ===== -->
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-coins"></i> Amount Requested (KES)</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text">KES</span>
                        <input type="number" name="amount" class="form-control" placeholder="0.00" required>
                    </div>
                </div>

                <!-- ===== REASONS ===== -->
                <div class="mb-4">
                    <label class="form-label mb-3"><i class="fas fa-list-check"></i> Reason for Refund (Select all that apply)</label>
                    <div class="reason-checklist shadow-sm">
                        <div class="form-check custom-check mb-2">
                            <input class="form-check-input" type="checkbox" name="reasons" value="exit" id="chkExit">
                            <label class="form-check-label ms-2 fw-medium" for="chkExit">Full Exit from Welfare</label>
                        </div>
                        <div class="form-check custom-check mb-2">
                            <input class="form-check-input" type="checkbox" name="reasons" value="medical" id="chkMedical">
                            <label class="form-check-label ms-2 fw-medium" for="chkMedical">Medical/Emergency Expenses</label>
                        </div>
                        <div class="form-check custom-check mb-2">
                            <input class="form-check-input" type="checkbox" name="reasons" value="fees" id="chkFees">
                            <label class="form-check-label ms-2 fw-medium" for="chkFees">School Fees Payment</label>
                        </div>
                        <div class="form-check custom-check mb-0">
                            <input class="form-check-input" type="checkbox" name="reasons" value="other" id="chkOther">
                            <label class="form-check-label ms-2 fw-bold" style="color: var(--welfare-dark-green);" for="chkOther">Other (Please specify below)</label>
                        </div>

                        <div id="otherInputWrapper" class="mt-4" style="display: none;">
                            <label class="small fw-bold text-muted mb-2">Detailed Reason</label>
                            <textarea name="other_details" class="form-control" rows="3" placeholder="Provide more details..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- ===== SUBMIT ===== -->
                <button type="submit" class="btn-eldo shadow-lg">
                    <i class="bi bi-send-fill"></i> Submit Application
                </button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#chkOther').change(function() {
                if($(this).is(':checked')) {
                    $('#otherInputWrapper').slideDown(300);
                    $('#otherInputWrapper textarea').prop('required', true).focus();
                } else {
                    $('#otherInputWrapper').slideUp(200);
                    $('#otherInputWrapper textarea').prop('required', false);
                }
            });
        });
    </script>
</body>
</html>
