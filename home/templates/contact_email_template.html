<div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: auto; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden;">
    <div style="background-color: #14452F; padding: 20px; text-align: center; color: white;">
        <h2 style="margin: 0;">Eldopoly SACCO</h2>
        <p style="margin: 5px 0 0 0; opacity: 0.8;">New Website Inquiry</p>
    </div>
    <div style="padding: 30px; background-color: #ffffff;">
        <h3 style="color: #333; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px;">Contact Details</h3>
        <table style="width: 100%; border-collapse: collapse;">
            <tr>
                <td style="padding: 10px 0; color: #666; width: 30%;"><strong>Full Name:</strong></td>
                <td style="padding: 10px 0; color: #333;">{{ name }}</td>
            </tr>
            <tr>
                <td style="padding: 10px 0; color: #666;"><strong>Email Address:</strong></td>
                <td style="padding: 10px 0; color: #333;"><a href="mailto:{{ email }}">{{ email }}</a></td>
            </tr>
            <tr>
                <td style="padding: 10px 0; color: #666;"><strong>Phone:</strong></td>
                <td style="padding: 10px 0; color: #333;">{{ phone }}</td>
            </tr>
        </table>

        <h3 style="color: #333; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-top: 30px;">Message Content</h3>
        <div style="padding: 15px; background-color: #f9f9f9; border-left: 4px solid #14452F; color: #444; line-height: 1.6;">
            {{ message|linebreaks }}
        </div>
    </div>
    <div style="background-color: #f0f2f5; padding: 15px; text-align: center; color: #888; font-size: 12px;">
        This email was sent from the Eldopoly SACCO Contact Form.
    </div>
</div>
